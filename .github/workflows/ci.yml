name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography

      - name: Install pywin32 (Windows named-pipe broker tests)
        if: runner.os == 'Windows'
        run: pip install pywin32

      - name: Run tests
        run: python -m unittest discover -s tests -v

  postgres-connector:
    name: postgres connector (real SCRAM)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: blindvault
          POSTGRES_PASSWORD: blindvault_dev_pw
          POSTGRES_DB: blindvault
          POSTGRES_HOST_AUTH_METHOD: scram-sha-256
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blindvault"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install cryptography
      - name: PostgreSQL connector end-to-end (SCRAM against a real server)
        working-directory: tests
        env:
          BLINDVAULT_TEST_PG: "1"
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: blindvault
          PGPASSWORD: blindvault_dev_pw
          PGDATABASE: blindvault
        run: python -m unittest test_vault.PgConnectorTests.test_real_postgres_scram -v
