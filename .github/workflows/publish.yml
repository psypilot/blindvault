name: Publish to PyPI

# Publishes the package to PyPI using "trusted publishing" (OIDC) — no token.
# This is MANUAL until you do the one-time PyPI setup, so releases don't fail
# before then. One-time setup: on PyPI add a pending publisher for project
# "blindvault", owner "psypilot", repo "blindvault", workflow "publish.yml",
# environment "pypi". After that, run this workflow from the Actions tab, or
# change the trigger below to:  on: { release: { types: [published] } }
on:
  workflow_dispatch:

permissions:
  id-token: write  # required for trusted publishing

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
